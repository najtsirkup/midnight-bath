        "telephone": "+372-504-3542",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Järve farm",
          "postalCode": "67411",
          "addressLocality": "Arula",
          "addressCountry": "EE"
        },
        "sameAs": [
          "https://www.instagram.com/khisbath/",
          "https://www.facebook.com/khisbath/"
        ]
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "KHIS Bath",
        "url": "https://khisbath.com",
        "inLanguage": ["en", "et"],
        "potentialAction": {
          "@type": "SearchAction",

          "query-input": "required name=search_term_string"
        }
      }

    <script type="application/ld+json">

  </head>

  <body>
    <div id="root"></div>

    <!-- Hidden static form so Netlify detects it at build time. The real form is rendered by React (ContactForm). -->
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="country" />
      <input type="tel" name="phone" />
      <input type="text" name="preferred-model" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>

    <script type="module" src="/src/main.tsx"></script>
  </body>
